<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc" />
  
  <!-- Machine Base -->
  <rect x="150" y="350" width="500" height="100" fill="#1E293B" />
  
  <!-- Machine Body -->
  <rect x="200" y="150" width="400" height="200" fill="#64748B" />
  
  <!-- Large Gear -->
  <circle cx="300" cy="250" r="70" fill="#94A3B8" />
  <circle cx="300" cy="250" r="20" fill="#1E293B" />
  <line x1="300" y1="180" x2="300" y2="320" stroke="#1E293B" stroke-width="5" />
  <line x1="230" y1="250" x2="370" y2="250" stroke="#1E293B" stroke-width="5" />
  <line x1="250" y1="200" x2="350" y2="300" stroke="#1E293B" stroke-width="5" />
  <line x1="250" y1="300" x2="350" y2="200" stroke="#1E293B" stroke-width="5" />
  
  <!-- Small Gear -->
  <circle cx="450" cy="200" r="40" fill="#94A3B8" />
  <circle cx="450" cy="200" r="10" fill="#1E293B" />
  <line x1="450" y1="160" x2="450" y2="240" stroke="#1E293B" stroke-width="3" />
  <line x1="410" y1="200" x2="490" y2="200" stroke="#1E293B" stroke-width="3" />
  <line x1="420" y1="170" x2="480" y2="230" stroke="#1E293B" stroke-width="3" />
  <line x1="420" y1="230" x2="480" y2="170" stroke="#1E293B" stroke-width="3" />
  
  <!-- Wrench -->
  <path d="M500,250 L550,220 L545,210 L490,245 L500,250" fill="#E25822" />
  
  <!-- Maintenance Person Silhouette -->
  <circle cx="150" cy="200" r="20" fill="#1E293B" /> <!-- Head -->
  <rect x="140" y="220" width="20" height="50" fill="#1E293B" /> <!-- Body -->
  <line x1="140" y1="230" x2="120" y2="260" stroke="#1E293B" stroke-width="5" /> <!-- Left Arm -->
  <line x1="160" y1="230" x2="180" y2="260" stroke="#1E293B" stroke-width="5" /> <!-- Right Arm -->
  <line x1="150" y1="270" x2="140" y2="320" stroke="#1E293B" stroke-width="5" /> <!-- Left Leg -->
  <line x1="150" y1="270" x2="160" y2="320" stroke="#1E293B" stroke-width="5" /> <!-- Right Leg -->
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial" font-size="24" text-anchor="middle" fill="#1E293B">Machine Maintenance</text>
  
  <!-- Navneet Industries Logo -->
  <text x="400" y="450" font-family="Arial" font-size="18" text-anchor="middle" fill="#F8FAFC">Navneet Industries</text>
</svg>
